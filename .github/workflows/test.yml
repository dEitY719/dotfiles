name: Test Suite

# Shell lint via mise (replaces ad-hoc shellcheck block).
# Issue #722 PR 3 (#727): single SSOT for tool versions + tasks lives
# in mise.toml. The previous inline shellcheck loop had `|| true`,
# silently swallowing failures; `mise run lint-sh` is a real gate.

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Do not cancel in-progress runs: GitHub marks pre-start cancelled jobs as
# "failure" (not "cancelled") in the API, which pollutes check history.
# Lint takes ~1-2 min on the runner — the extra runner minutes are acceptable.
concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  lint:
    name: Shell Lint (mise)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup mise
        uses: jdx/mise-action@v2
        with:
          install: true
          cache: true

      - name: Run mise lint-sh
        run: mise run lint-sh
