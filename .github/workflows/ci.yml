name: CI

# Dotfiles-wide CI: lint only via mise.
# Replaces the previous tox-driven flow (issue #722, PR 3 = #727).
# Tool versions are pinned in mise.toml at the repo root — same SSOT
# as local `mise run lint` / `mise run test`, so CI and developer
# laptops cannot drift.
#
# Note on the `test` job removal (#754, 2026-05-27):
#   The previous `Test (mise)` job was removed because each PR push was
#   costing 10~15 min of runner time while the same 933-item pytest
#   matrix completes in ~3 min on a local 8+ core dev machine via
#   `mise run test`. Pytest now runs in the local `pre-push` git hook
#   (see `git/hooks/pre-push` and `docs/.ssot/local-test-policy.md`).
#   Roll back: `git revert` this commit and re-add the job. Branch
#   protection's required-check list must drop `Test (mise)` to match.
#
# The previous packages/my-cli Node.js pipeline moved to
# .github/workflows/cli-package.yml unchanged.

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

# Do not cancel in-progress runs: GitHub marks pre-start cancelled jobs as
# "failure" (not "cancelled") in the API, which pollutes check history.
# Lint takes ~1-2 min on the runner — the extra runner minutes are acceptable.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  lint:
    name: Lint (mise)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup mise
        uses: jdx/mise-action@v2
        with:
          install: true
          cache: true

      - name: Install Python deps (uv sync)
        # `mise run lint-py` invokes `uv run …` which auto-resolves the
        # dev group, but pre-syncing makes the install step explicit in
        # logs and primes uv's cache for the subsequent step.
        run: uv sync --group dev

      - name: Run mise lint
        run: mise run lint
