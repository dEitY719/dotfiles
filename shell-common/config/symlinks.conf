# Symbolic Link Management Configuration
# Single Source of Truth (SSOT) for all dotfiles symlinks
#
# Format: TARGET_PATH|SOURCE_PATH|DESCRIPTION
# - Paths use ${HOME} for environment independence
# - Scripts expand variables when creating/verifying links

# Work Log Management
${HOME}/work_log.txt|${HOME}/para/archive/playbook/logs/work_log.txt|Work log (symlink to playbook)

# SSH Configuration
${HOME}/.ssh/config|${HOME}/dotfiles/ssh/config|SSH config (managed by dotfiles)

# Ghostty Terminal
${HOME}/.config/ghostty/config|${HOME}/dotfiles/shell-common/config/ghostty/config|Ghostty terminal config
