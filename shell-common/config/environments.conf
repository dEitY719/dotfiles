# shell-common/config/environments.conf
# Single Source of Truth (SSOT): Environment-specific configuration values
#
# This file centralizes all configuration values for different environments.
# Format: ENVIRONMENT:SETTING_NAME=VALUE
#
# Benefits:
# - Single source of truth (avoid duplicating settings in multiple files)
# - Easy to update settings (change once, applies everywhere)
# - Clear visibility of all environment options
# - Used by setup.sh to generate .local.sh files automatically

# =============================================================================
# === Security Configuration (CA Certificates)
# =============================================================================
# Controls which CA certificate to use for SSL/TLS verification

# External environment: Custom certificate for corporate external PC (VPN)
external:CA_CERT="/usr/local/share/ca-certificates/samsungsemi-prx.com.crt"

# Internal environment: System CA bundle for corporate internal PC (direct)
internal:CA_CERT="/etc/ssl/certs/ca-certificates.crt"

# =============================================================================
# === NPM Configuration (Option 1: External Environment)
# =============================================================================
# External company PC (VPN or direct connection to public internet)
# Uses public npmjs registry with company CA certificate

external:NPM_REGISTRY="https://registry.npmjs.org/"
external:NPM_CAFILE="/usr/local/share/ca-certificates/samsungsemi-prx.com.crt"
external:NPM_STRICT_SSL="true"
external:NPM_PROXY=""
external:NPM_HTTPS_PROXY=""
external:NPM_NOPROXY=""

# =============================================================================
# === NPM Configuration (Option 2: Internal Environment)
# =============================================================================
# Internal company PC (direct connection, requires proxy for external access)
# Uses internal Artifactory repository with system CA and company proxy

internal:NPM_REGISTRY="http://repo.samsungds.net:8081/artifactory/api/npm/npm/"
internal:NPM_CAFILE="/etc/ssl/certs/ca-certificates.crt"
internal:NPM_STRICT_SSL="false"
internal:NPM_PROXY="http://12.26.204.100:8080"
internal:NPM_HTTPS_PROXY="http://12.26.204.100:8080"
internal:NPM_NOPROXY="10.229.95.200,10.229.95.220,12.36.155.91,12.36.154.116,12.36.154.130,localhost,127.0.0.1,.samsung.net,.samsungds.net,dsvdi.net,pfs.nprotect.com"

# =============================================================================
# === HTTP Proxy Configuration (Internal Environment Only)
# =============================================================================
# These settings are only defined for internal environment
# External environment (VPN) doesn't need proxy configuration

internal:PROXY_HTTP="http://12.26.204.100:8080/"
internal:PROXY_HTTPS="http://12.26.204.100:8080/"
internal:PROXY_NO="10.229.95.200,10.229.95.220,12.36.155.91,12.36.154.116,12.36.154.130,localhost,127.0.0.1,.samsung.net,.samsungds.net,ssai.samsungds.net,dsvdi.net,pfs.nprotect.com"

# =============================================================================
# Notes
# =============================================================================
# 1. Proxy Configuration:
#    - Internal: Company proxy required for external access
#    - External (VPN): Direct connection, no proxy needed
#
# 2. CA Certificates:
#    - Internal: Uses system CA bundle (already installed)
#    - External: Uses custom corporate certificate (install via setup_crt.sh)
#
# 3. Registry:
#    - Internal: Samsung internal Artifactory (company network only)
#    - External: Public npmjs registry (internet accessible)
#
# 4. To add a new environment:
#    - Define new settings with environment prefix (e.g., "public:...")
#    - Update setup.sh to handle the new environment in case statements
