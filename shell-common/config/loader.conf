# shell-common/config/loader.conf
# Module loader configuration (skip directories)
# Used by bash/main.bash and shell-common/util/loader.sh
#
# Format: One directory name per line (relative to dotfiles base)
# Comments: Lines starting with # are ignored
# Empty lines are ignored
#
# Examples:
#   core       - Deprecated files
#   util       - Utility scripts
#   deprecated - Old modules

# POSIX shell directories (shell-common/*)
# These are handled separately in main.bash/main.zsh, not auto-loaded

# Bash-specific directories to skip
core
ux_lib
util
env
scripts
config
claude
app
